name: Project Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    name: Python, R, notebooks, and dashboard code
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13.1
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.1"
          cache: pip

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyright

      - name: Static validation
        run: |
          python -m compileall src scripts streamlit_app
          pyright src scripts streamlit_app

      - name: Run reproducible project pipeline
        run: python scripts/run_pipeline.py

      - name: Run Python tests
        run: pytest

      - name: Validate notebook syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import nbformat

          errors = []
          for path in sorted(Path("notebooks").glob("*.ipynb")):
              notebook = nbformat.read(path, as_version=4)
              for index, cell in enumerate(notebook.cells, start=1):
                  if cell.cell_type != "code":
                      continue
                  try:
                      compile(cell.source, f"{path.name}:cell{index}", "exec")
                  except SyntaxError as exc:
                      errors.append((path.name, index, exc.msg, exc.lineno, exc.offset))

          if errors:
              for error in errors:
                  print(error)
              raise SystemExit(1)

          print("Notebook compile OK")
          PY

      - name: Run R statistical validation scripts
        run: |
          Rscript r/workforce_statistical_analysis.R
          Rscript r/attrition_group_comparison.R

